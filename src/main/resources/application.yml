server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/petSql?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: entity
  configuration:
    map-underscore-to-camel-case: true

upload:
  path: /Users/org/pet-uploads
  url-prefix: http://localhost:8080/upload